<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none" role="img" aria-label="DataCorsa — Global Proxy & Web Data Infrastructure">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b0820"/>
      <stop offset="0.55" stop-color="#1a1450"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <radialGradient id="globe" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#a5b4fc" stop-opacity="0.55"/>
      <stop offset="0.7" stop-color="#4f46e5" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#0b0820" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#ffffff" stop-opacity="0.0"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="20" fill="url(#bg)"/>

  <!-- Decorative globe / grid -->
  <g transform="translate(900 160)">
    <circle r="170" fill="url(#globe)"/>
    <g stroke="#a5b4fc" stroke-opacity="0.25" fill="none">
      <circle r="150"/>
      <ellipse rx="150" ry="60"/>
      <ellipse rx="150" ry="110"/>
      <ellipse rx="60"  ry="150"/>
      <ellipse rx="110" ry="150"/>
    </g>
    <g fill="#fff" filter="url(#soft)" opacity="0.85">
      <circle cx="-110" cy="-30" r="3"/>
      <circle cx="-60"  cy="40"  r="3"/>
      <circle cx="20"   cy="-70" r="3"/>
      <circle cx="80"   cy="20"  r="3"/>
      <circle cx="-30"  cy="100" r="3"/>
      <circle cx="120"  cy="-50" r="3"/>
    </g>
    <g stroke="url(#line)" stroke-width="1.4" fill="none" opacity="0.9">
      <path d="M-110 -30 Q -20 -120 120 -50"/>
      <path d="M-60 40 Q 0 -10 80 20"/>
      <path d="M-30 100 Q 40 60 120 -50"/>
      <path d="M-110 -30 Q -90 60 -30 100"/>
    </g>
  </g>

  <!-- Wordmark / icon -->
  <g transform="translate(72 84)">
    <rect width="72" height="72" rx="18" fill="#ffffff" fill-opacity="0.10" stroke="#a5b4fc" stroke-opacity="0.35"/>
    <line x1="18" y1="18" x2="54" y2="36" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <line x1="18" y1="54" x2="54" y2="36" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <circle cx="18" cy="18" r="6" fill="#fff"/>
    <circle cx="18" cy="54" r="6" fill="#fff"/>
    <circle cx="54" cy="36" r="5" fill="#a5b4fc"/>
  </g>

  <text x="170" y="138"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800" font-size="56" letter-spacing="-1.2" fill="#ffffff">
    DataCorsa
  </text>
  <text x="170" y="178"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="500" font-size="22" fill="#cbd5ff" letter-spacing="0.2">
    Global Proxy &amp; Web Data Infrastructure
  </text>

  <!-- Stat chips -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="700">
    <g transform="translate(170 210)">
      <rect width="170" height="60" rx="12" fill="#ffffff" fill-opacity="0.08" stroke="#a5b4fc" stroke-opacity="0.30"/>
      <text x="16" y="28" fill="#ffffff" font-size="22">150M+</text>
      <text x="16" y="48" fill="#cbd5ff" font-size="12" font-weight="500">Residential IPs</text>
    </g>
    <g transform="translate(355 210)">
      <rect width="170" height="60" rx="12" fill="#ffffff" fill-opacity="0.08" stroke="#a5b4fc" stroke-opacity="0.30"/>
      <text x="16" y="28" fill="#ffffff" font-size="22">195+</text>
      <text x="16" y="48" fill="#cbd5ff" font-size="12" font-weight="500">Countries &amp; regions</text>
    </g>
    <g transform="translate(540 210)">
      <rect width="170" height="60" rx="12" fill="#ffffff" fill-opacity="0.08" stroke="#a5b4fc" stroke-opacity="0.30"/>
      <text x="16" y="28" fill="#ffffff" font-size="22">99.9%</text>
      <text x="16" y="48" fill="#cbd5ff" font-size="12" font-weight="500">Success rate / SLA</text>
    </g>
  </g>
</svg>

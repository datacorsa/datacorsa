<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 172 40" fill="none">
  <defs>
    <linearGradient id="dc-bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#120d38"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <!-- Lines fade from node (opaque) toward tip (semi-transparent) -->
    <linearGradient id="dc-l1" x1="10" y1="10" x2="30" y2="20" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="1"/>
      <stop offset="1" stop-color="white" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="dc-l2" x1="10" y1="30" x2="30" y2="20" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="1"/>
      <stop offset="1" stop-color="white" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect width="40" height="40" rx="10" fill="url(#dc-bg)"/>

  <!-- Network connection lines -->
  <line x1="10" y1="10" x2="30" y2="20" stroke="url(#dc-l1)" stroke-width="3" stroke-linecap="round"/>
  <line x1="10" y1="30" x2="30" y2="20" stroke="url(#dc-l2)" stroke-width="3" stroke-linecap="round"/>

  <!-- Data nodes: two sources (left) + one output (right tip) -->
  <circle cx="10" cy="10" r="4.5" fill="white"/>
  <circle cx="10" cy="30" r="4.5" fill="white"/>
  <circle cx="30" cy="20" r="3.5" fill="white" opacity="0.82"/>

  <!-- Wordmark -->
  <text x="52" y="26.5"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="17"
    letter-spacing="-0.4">
    <tspan fill="#120d38">Data</tspan><tspan fill="#4f46e5">Corsa</tspan>
  </text>
</svg>

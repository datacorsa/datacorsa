<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" fill="none" role="img" aria-label="DataCorsa global IP coverage">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b0820"/>
      <stop offset="1" stop-color="#1a1450"/>
    </linearGradient>
    <radialGradient id="dot" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="480" rx="20" fill="url(#bg2)"/>

  <text x="60" y="70"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800" font-size="34" fill="#ffffff" letter-spacing="-0.4">
    195+ countries and regions
  </text>
  <text x="60" y="100"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="500" font-size="16" fill="#cbd5ff">
    Country, city, and ZIP-code targeting
  </text>

  <!-- Stylised dot map -->
  <g fill="url(#dot)">
    <!-- North America -->
    <circle cx="220" cy="220" r="18" opacity="0.95"/>
    <circle cx="280" cy="200" r="10" opacity="0.7"/>
    <circle cx="190" cy="250" r="8"  opacity="0.7"/>
    <circle cx="320" cy="240" r="6"  opacity="0.6"/>
    <!-- South America -->
    <circle cx="340" cy="360" r="12" opacity="0.85"/>
    <circle cx="370" cy="400" r="6"  opacity="0.6"/>
    <!-- Europe -->
    <circle cx="600" cy="200" r="20" opacity="0.95"/>
    <circle cx="640" cy="180" r="10" opacity="0.7"/>
    <circle cx="560" cy="220" r="8"  opacity="0.7"/>
    <circle cx="660" cy="220" r="6"  opacity="0.6"/>
    <!-- Africa -->
    <circle cx="640" cy="340" r="10" opacity="0.7"/>
    <circle cx="680" cy="380" r="6"  opacity="0.6"/>
    <!-- Middle East -->
    <circle cx="720" cy="260" r="8" opacity="0.7"/>
    <!-- Asia -->
    <circle cx="880" cy="230" r="22" opacity="0.95"/>
    <circle cx="930" cy="210" r="10" opacity="0.7"/>
    <circle cx="830" cy="260" r="9"  opacity="0.7"/>
    <circle cx="960" cy="250" r="8"  opacity="0.7"/>
    <!-- Oceania -->
    <circle cx="1000" cy="380" r="10" opacity="0.7"/>
    <circle cx="1040" cy="400" r="6"  opacity="0.6"/>
  </g>

  <!-- Region labels -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
     font-weight="700" font-size="13" fill="#cbd5ff">
    <text x="170" y="290">North America</text>
    <text x="300" y="430">South America</text>
    <text x="560" y="160">Europe</text>
    <text x="620" y="410">Africa</text>
    <text x="830" y="180">Asia</text>
    <text x="970" y="430">Oceania</text>
  </g>

  <!-- Stat strip -->
  <g transform="translate(60 0)">
    <g transform="translate(0 0)">
      <rect x="0"   y="340" width="240" height="80" rx="12" fill="#ffffff" fill-opacity="0.06" stroke="#a5b4fc" stroke-opacity="0.25"/>
      <text x="20" y="372" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="26" fill="#ffffff">200M+</text>
      <text x="20" y="398" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="13" fill="#cbd5ff">Global proxy IP pool</text>
    </g>
  </g>
</svg>
